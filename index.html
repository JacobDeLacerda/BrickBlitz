<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICK BLITZ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Arial Black', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000;
        }

        #title {
            font-size: 3.5rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
            display: flex;
            gap: 10px;
        }

        .title-letter {
            text-shadow: 0 0 10px currentColor;
        }

        #scoreboard {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            gap: 24px;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #placement-area {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(10, 30px);
            gap: 2px;
            background-color: #111;
            padding: 5px;
            border-radius: 4px;
            border: 2px solid #222;
        }

        #generation-area {
            display: flex;
            gap: 12px;
            touch-action: none;
        }

        .shape-slot {
            display: grid;
            grid-template-columns: repeat(4, 30px);
            grid-template-rows: repeat(4, 30px);
            gap: 2px;
            background-color: #111;
            padding: 5px;
            border-radius: 4px;
            border: 2px solid #222;
        }

        #placement-area {
            grid-template-rows: repeat(10, 30px);
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: #1a1a1a;
            border-radius: 4px;
        }

        .block {
            cursor: grab;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
            touch-action: none;
        }

        .highlight-red {
            background-color: rgba(255, 50, 50, 0.2) !important;
            box-shadow: inset 0 0 8px rgba(255, 0, 0, 0.3);
        }

        .ghost-container {
            position: fixed;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
            display: none;
        }

        .ghost-block {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            cursor: pointer;
            background-color: #2a2a2a;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over-popup {
            background-color: #222;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .score-popup {
            position: fixed;
            pointer-events: none;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: bold;
            font-size: 1.4rem;
            color: #FFD700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            z-index: 100;
            animation: floatUp 1s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0%   { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -60px); }
        }
    </style>
</head>
<body>
<div id="title">
    <span class="title-letter" style="color: #3FE0D0">B</span>
    <span class="title-letter" style="color: #7A6FF0">R</span>
    <span class="title-letter" style="color: #FF6B6B">I</span>
    <span class="title-letter" style="color: #4ECDC4">C</span>
    <span class="title-letter" style="color: #45B7D1">K</span>
    <span class="title-letter" style="color: #FF9F43">B</span>
    <span class="title-letter" style="color: #6C5CE7">L</span>
    <span class="title-letter" style="color: #00B894">I</span>
    <span class="title-letter" style="color: #D63031">T</span>
    <span class="title-letter" style="color: #FDCB6E">Z</span>
</div>
<div id="scoreboard">
    <span>SCORE: <span id="current-score">0</span></span>
    <span>HIGH SCORE: <span id="high-score">0</span></span>
</div>
<div id="game-container">
    <div id="placement-area"></div>
    <div id="generation-area">
        <div class="shape-slot"></div>
        <div class="shape-slot"></div>
        <div class="shape-slot"></div>
    </div>
</div>
<button id="start-button">NEW GAME</button>

<div id="game-over-overlay">
    <div id="game-over-popup">
        <h2>GAME OVER!</h2>
        <p>Your High Score: <span id="game-over-high-score"></span></p>
        <button id="restart-button">Restart</button>
    </div>
</div>

<script>
    // ── Constants ────────────────────────────────────────────────────────────
    const CELL_SIZE = 32; // 30px cell + 2px gap
    const colors = ["#3FE0D0", "#7A6FF0", "#FF6B6B", "#4ECDC4", "#45B7D1", "#FF9F43"];
    const BASE_POINTS_PER_LINE = 50;
    const COMBO_BASE_BONUS = 100;
    const COMBO_MULTIPLIER = 1.05;
    const gridSize = 10;

    // ── State ────────────────────────────────────────────────────────────────
    let highScore = parseInt(localStorage.getItem('highScore')) || 0;
    let currentScore = 0;
    let currentShapes = [];
    let isDragging = false;
    let draggedShape = null;
    let ghostContainer = null;
    let gameActive = true;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const placementArea = document.getElementById('placement-area');
    const generationArea = document.getElementById('generation-area');
    const startButton = document.getElementById('start-button');
    const highScoreElement = document.getElementById('high-score');
    const currentScoreElement = document.getElementById('current-score');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const gameOverHighScore = document.getElementById('game-over-high-score');
    const restartButton = document.getElementById('restart-button');

    // Show persisted high score immediately
    highScoreElement.textContent = highScore;

    // ── Grid init ────────────────────────────────────────────────────────────
    const shapeSlots = document.querySelectorAll('.shape-slot');
    let placementGrid = createGrid(placementArea, 10, 10);
    let generationGrids = [
        createGrid(shapeSlots[0], 4, 4),
        createGrid(shapeSlots[1], 4, 4),
        createGrid(shapeSlots[2], 4, 4),
    ];
    let placementCells = placementGrid.flat(); // cached for clearHighlights

    // ── Functions ────────────────────────────────────────────────────────────

    function createGrid(container, rows, cols) {
        container.innerHTML = '';
        const grid = [];
        for (let row = 0; row < rows; row++) {
            grid[row] = [];
            for (let col = 0; col < cols; col++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                container.appendChild(cell);
                grid[row][col] = cell;
            }
        }
        return grid;
    }

    function generateShape() {
        if (!gameActive) return;

        // Clean up previous shapes' listeners using stored references
        currentShapes.forEach(s => {
            s.shape.forEach(([row, col]) => {
                const cell = generationGrids[s.slotIndex][row][col];
                cell.classList.remove('block');
                cell.style.backgroundColor = '#1a1a1a';
                cell.removeEventListener('pointerdown', s.listener);
            });
        });

        currentShapes = [];

        const shapes = [
            [[0, 0], [0, 1], [1, 0]],           // angle/triangle
            [[0, 0], [0, 1], [0, 2]],            // line of 3
            [[0, 0], [1, 0]],                    // line of 2
            [[0, 0], [0, 1], [1, 0], [1, 1]],   // square
            [[0, 0], [0, 1], [0, 2], [0, 3]],   // line of 4
            [[0, 0], [1, 0], [2, 0], [1, 1]],   // T-shape
            [[0, 0], [0, 1], [1, 1], [1, 2]],   // zigzag
            [[0, 0], [0, 1], [1, 1], [2, 1]],   // L-shape
            [[0, 1], [1, 1], [2, 1], [2, 0]],   // reverse L-shape
        ];

        let placedCount = 0;

        for (let i = 0; i < 3; i++) {
            if (Math.random() < 0.8) {
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const slotIndex = placedCount;

                const canPlace = shape.every(([row, col]) => {
                    return col < 4 && !generationGrids[slotIndex][row][col].classList.contains('block');
                });

                if (canPlace) {
                    const newShape = { shape, color, slotIndex };
                    // Store bound listener so it can be correctly removed later
                    newShape.listener = (e) => startDrag(e, newShape);
                    currentShapes.push(newShape);

                    shape.forEach(([row, col]) => {
                        const cell = generationGrids[slotIndex][row][col];
                        cell.classList.add('block');
                        cell.style.backgroundColor = color;
                        cell.addEventListener('pointerdown', newShape.listener);
                    });
                    placedCount++;
                }
            }
        }

        if (isGameOver()) {
            endGame();
        }
    }

    function startDrag(e, shape) {
        if (isDragging) return; // guard against stacked listeners
        if (!gameActive) return;
        e.preventDefault();

        isDragging = true;
        draggedShape = shape;

        // Build ghost container once per drag — just reposition it in handleDrag
        ghostContainer = document.createElement('div');
        ghostContainer.className = 'ghost-container';
        shape.shape.forEach(([dr, dc]) => {
            const ghostBlock = document.createElement('div');
            ghostBlock.className = 'ghost-block';
            ghostBlock.style.backgroundColor = shape.color;
            ghostBlock.style.transform = `translate(${dc * CELL_SIZE}px, ${dr * CELL_SIZE}px)`;
            ghostContainer.appendChild(ghostBlock);
        });
        document.body.appendChild(ghostContainer);

        document.addEventListener('pointermove', handleDrag);
        document.addEventListener('pointerup', stopDrag);
        handleDrag(e);
    }

    function handleDrag(e) {
        if (!isDragging || !draggedShape) return;
        e.preventDefault();

        const rect = placementArea.getBoundingClientRect();
        const col = Math.floor((e.clientX - rect.left) / CELL_SIZE);
        const row = Math.floor((e.clientY - rect.top) / CELL_SIZE);

        ghostContainer.style.display = 'block';

        if (isValidPlacement(row, col, draggedShape)) {
            ghostContainer.style.left = `${rect.left + col * CELL_SIZE}px`;
            ghostContainer.style.top = `${rect.top + row * CELL_SIZE}px`;
            highlightValidPosition(row, col, draggedShape);
        } else {
            // Follow cursor freely when not over a valid placement
            ghostContainer.style.left = `${e.clientX}px`;
            ghostContainer.style.top = `${e.clientY}px`;
            clearHighlights();
        }
    }

    function stopDrag(e) {
        isDragging = false;
        document.removeEventListener('pointermove', handleDrag);
        document.removeEventListener('pointerup', stopDrag);

        if (ghostContainer) {
            ghostContainer.remove();
            ghostContainer = null;
        }

        const success = placeShape(e, draggedShape);
        if (success) {
            draggedShape.shape.forEach(([row, col]) => {
                const cell = generationGrids[draggedShape.slotIndex][row][col];
                cell.classList.remove('block');
                cell.style.backgroundColor = '#1a1a1a';
                cell.removeEventListener('pointerdown', draggedShape.listener);
            });

            currentShapes = currentShapes.filter(s => s !== draggedShape);
            checkCompletedLines();
            if (currentShapes.length === 0) {
                generateShape();
            } else if (isGameOver()) {
                endGame();
            }
        }

        clearHighlights();
        draggedShape = null;
    }

    function highlightValidPosition(row, col, shape) {
        clearHighlights();
        shape.shape.forEach(([dr, dc]) => {
            const targetRow = row + dr;
            const targetCol = col + dc;
            if (targetRow >= 0 && targetRow < gridSize && targetCol >= 0 && targetCol < gridSize) {
                placementGrid[targetRow][targetCol].classList.add('highlight-red');
            }
        });
    }

    function isValidPlacement(row, col, shape) {
        return shape.shape.every(([dr, dc]) => {
            const targetRow = row + dr;
            const targetCol = col + dc;
            return (
                targetRow >= 0 && targetRow < gridSize &&
                targetCol >= 0 && targetCol < gridSize &&
                !placementGrid[targetRow][targetCol].classList.contains('block')
            );
        });
    }

    function placeShape(e, shape) {
        const rect = placementArea.getBoundingClientRect();
        const col = Math.floor((e.clientX - rect.left) / CELL_SIZE);
        const row = Math.floor((e.clientY - rect.top) / CELL_SIZE);

        if (!isValidPlacement(row, col, shape)) return false;

        shape.shape.forEach(([dr, dc]) => {
            const cell = placementGrid[row + dr][col + dc];
            cell.classList.add('block');
            cell.style.backgroundColor = shape.color;
        });

        return true;
    }

    function checkCompletedLines() {
        const rowsToClear = [];
        const colsToClear = [];

        for (let row = 0; row < gridSize; row++) {
            let complete = true;
            for (let col = 0; col < gridSize; col++) {
                if (!placementGrid[row][col].classList.contains('block')) {
                    complete = false;
                    break;
                }
            }
            if (complete) rowsToClear.push(row);
        }

        for (let col = 0; col < gridSize; col++) {
            let complete = true;
            for (let row = 0; row < gridSize; row++) {
                if (!placementGrid[row][col].classList.contains('block')) {
                    complete = false;
                    break;
                }
            }
            if (complete) colsToClear.push(col);
        }

        const linesCleared = rowsToClear.length + colsToClear.length;
        if (linesCleared === 0) return 0;

        let comboBonus = 0;
        if (linesCleared >= 2) {
            comboBonus = COMBO_BASE_BONUS * Math.pow(COMBO_MULTIPLIER, linesCleared - 2);
        }

        const totalPoints = linesCleared * BASE_POINTS_PER_LINE + Math.round(comboBonus);
        currentScore += totalPoints;
        currentScoreElement.textContent = currentScore;

        if (currentScore > highScore) {
            highScore = currentScore;
            highScoreElement.textContent = highScore;
        }

        showScorePopup(totalPoints, linesCleared);

        // Deduplicate cells at row+column intersections before clearing
        const cellsToClear = new Set();
        rowsToClear.forEach(row => {
            for (let col = 0; col < gridSize; col++) cellsToClear.add(`${row},${col}`);
        });
        colsToClear.forEach(col => {
            for (let row = 0; row < gridSize; row++) cellsToClear.add(`${row},${col}`);
        });

        cellsToClear.forEach(key => {
            const [r, c] = key.split(',').map(Number);
            placementGrid[r][c].classList.remove('block');
            placementGrid[r][c].style.backgroundColor = '#1a1a1a';
        });

        return linesCleared;
    }

    function clearHighlights() {
        placementCells.forEach(cell => cell.classList.remove('highlight-red'));
    }

    function isGameOver() {
        if (currentShapes.length === 0) return false;

        for (const shape of currentShapes) {
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    if (isValidPlacement(row, col, shape)) return false;
                }
            }
        }
        return true;
    }

    function showScorePopup(points, linesCleared) {
        if (points <= 0) return;

        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = linesCleared >= 2 ? `+${points} COMBO!` : `+${points}`;

        const rect = placementArea.getBoundingClientRect();
        popup.style.left = `${rect.left + rect.width / 2}px`;
        popup.style.top = `${rect.top + rect.height / 2}px`;

        document.body.appendChild(popup);
        popup.addEventListener('animationend', () => popup.remove());
    }

    function endGame() {
        gameActive = false;
        localStorage.setItem('highScore', highScore);
        gameOverHighScore.textContent = highScore;
        gameOverOverlay.style.display = 'flex';
    }

    function startGame() {
        placementGrid = createGrid(placementArea, 10, 10);
        generationGrids = [
            createGrid(shapeSlots[0], 4, 4),
            createGrid(shapeSlots[1], 4, 4),
            createGrid(shapeSlots[2], 4, 4),
        ];
        placementCells = placementGrid.flat();
        currentScore = 0;
        currentScoreElement.textContent = 0;
        highScoreElement.textContent = highScore;
        gameActive = true;
        gameOverOverlay.style.display = 'none';
        generateShape();
    }

    startButton.addEventListener('click', startGame);
    restartButton.addEventListener('click', startGame);
    startGame();

    // ── Service Worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Registration Failed', err));
    }
</script>
</body>
</html>
